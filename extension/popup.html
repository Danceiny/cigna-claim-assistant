<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cigna Claim Assistant</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Cigna Claim Assistant</h1>
        <p>拖入 PDF/图片，本地识别后按天生成理赔单。</p>
      </header>

      <section class="settings">
        <label>
          被保险人姓名
          <input id="beneficiaryName" placeholder="与 Cigna 页面卡片一致">
        </label>
        <label>
          报销理由
          <input id="diagnosis" placeholder="例如 BACK_PAIN">
        </label>
        <label>
          治疗国家/地区
          <input id="country" value="阿拉伯联合酋长国">
        </label>
        <label>
          理赔类型
          <input id="claimType" value="医疗类">
        </label>
        <label>
          就诊类型
          <input id="visitType" value="门诊">
        </label>
        <label>
          付款账户关键词
          <input id="paymentLabel" placeholder="例如 BANK 0001">
        </label>
        <label>
          长期病症最早治疗日期
          <input id="earliestDate" type="date">
        </label>
        <label>
          最早提交服务日期
          <input id="minServiceDate" type="date">
        </label>
        <label class="inline">
          <input id="allowReview" type="checkbox" checked>
          允许提交需复核但未阻塞的项目
        </label>
        <label class="inline">
          <input id="autoSubmitOnSelect" type="checkbox">
          拖入/选择文件后自动处理并提交
        </label>
      </section>

      <section id="settingsStatus" class="settings-status"></section>
      <section id="ledgerStatus" class="ledger-status"></section>

      <label class="dropzone" for="folderFiles">
        <input id="folderFiles" type="file" multiple webkitdirectory accept=".pdf,.png,.jpg,.jpeg,.gif,.bmp,.txt,text/plain">
        <span>选择或拖入报销文件夹</span>
      </label>

      <section class="actions">
        <button id="openCigna">打开 Cigna</button>
        <button id="checkCigna">检查 Cigna 页面</button>
        <button id="exportCignaDiagnostics">导出 Cigna 诊断</button>
        <button id="openAssistant">独立页面</button>
        <button id="pickFiles">添加文件</button>
        <input id="files" class="hidden-input" type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.gif,.bmp,.txt,text/plain">
        <button id="clearBatch" disabled>清空批次</button>
        <button id="analyze">识别文件</button>
        <button id="compress" disabled>压缩 PDF</button>
        <button id="preflightSubmit" disabled>提交预检</button>
        <button id="submit" disabled>提交可提交项</button>
        <button id="autoSubmit" disabled>自动处理并提交</button>
        <button id="exportPlan" disabled>导出计划</button>
        <button id="exportLedger">导出记录</button>
        <button id="importLedger">导入记录</button>
        <input id="ledgerFile" class="hidden-input" type="file" accept=".json,application/json">
        <button id="exportBackup">导出备份</button>
        <button id="importBackup">导入备份</button>
        <input id="backupFile" class="hidden-input" type="file" accept=".json,application/json">
        <button id="clearLedger">清空记录</button>
      </section>

      <section id="summary" class="summary"></section>
      <section id="claims" class="claims"></section>
      <section id="log" class="log"></section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
